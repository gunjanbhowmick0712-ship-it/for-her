<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>For You ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(-45deg,#ff4b6e,#ff7eb3,#ffb199,#ffd1dc);
    background-size:400% 400%;
    animation:bg 12s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(12px);
    padding:40px;
    border-radius:25px;
    text-align:center;
    color:white;
    max-width:600px;
    box-shadow:0 10px 40px rgba(0,0,0,.2);
}

h1{
    margin-bottom:15px;
}

button{
    border:none;
    padding:15px 30px;
    border-radius:50px;
    background:white;
    color:#ff4b6e;
    cursor:pointer;
    font-size:18px;
    margin-top:20px;
}

#secret{
    margin-top:25px;
    display:none;
    font-size:22px;
    animation:fade 2s;
}

@keyframes fade{
    from{opacity:0}
    to{opacity:1}
}

.heart{
    position:absolute;
    color:white;
    animation:float 8s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="card">
    <h1>Hey Beautiful ❤️</h1>

    <p>
        I made something special for you.
        Click the button when you're ready.
    </p>

    <button onclick="reveal()">
        Open My Heart 🌹
    </button>

    <div id="secret">
        You are my favorite hello,
        my hardest goodbye,
        and one of the best things that has ever happened to me. ❤️
    </div>
</div>

<script>

function reveal(){
    document.getElementById("secret").style.display="block";
}

setInterval(()=>{
    const h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";

    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(Math.random()*20+15)+"px";

    document.body.appendChild(h);

    setTimeout(()=>h.remove(),8000);

},300);

</script>

</body>
</html>
