<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A Little Adventure ❤️</title>



<style>

body{

    margin:0;

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:linear-gradient(135deg,#667eea,#764ba2);

    font-family:Arial,sans-serif;

    color:white;

    text-align:center;

}



.container{

    max-width:700px;

    padding:30px;

}



button{

    margin:10px;

    padding:12px 24px;

    border:none;

    border-radius:30px;

    background:white;

    color:#764ba2;

    font-size:16px;

    cursor:pointer;

}



#story{

    margin-top:20px;

    font-size:20px;

    line-height:1.6;

}

</style>

</head>



<body>



<div class="container">

    <h1>✨ Welcome, Beautiful ✨</h1>



    <p>You have discovered a mysterious page.</p>



    <div id="choices">

        <button onclick="path('stars')">Follow the Stars 🌟</button>

        <button onclick="path('ocean')">Walk to the Ocean 🌊</button>

        <button onclick="path('garden')">Enter the Garden 🌹</button>

    </div>



    <div id="story"></div>

</div>



<script>

function path(choice){



    let message="";



    if(choice==="stars"){

        message=`

        You follow the stars across the sky.

        They spell out a message:



        "Out of billions of people,

        I somehow found my favorite one."

        ❤️

        `;

    }



    if(choice==="ocean"){

        message=`

        You reach the ocean.

        Every wave whispers the same thing:



        "Someone is thinking about you

        right now."

        ❤️

        `;

    }



    if(choice==="garden"){

        message=`

        You enter a garden filled with roses.



        Hidden among them is a note:



        "You make ordinary days feel special."

        ❤️

        `;

    }



    document.getElementById("story").innerText=message;

}

</script>



</body>

</html>
