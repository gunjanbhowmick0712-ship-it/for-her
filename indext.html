<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Surprise For You ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Segoe UI,sans-serif;
    background:linear-gradient(-45deg,#ff4b6e,#ff7eb3,#ffb199,#ffd1dc);
    background-size:400% 400%;
    animation:bg 12s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(12px);
    border-radius:25px;
    padding:40px;
    text-align:center;
    color:white;
    width:85%;
    max-width:600px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

button{
    margin-top:20px;
    border:none;
    background:white;
    color:#ff4b6e;
    padding:14px 28px;
    border-radius:50px;
    font-size:18px;
    cursor:pointer;
}

#msg{
    display:none;
    margin-top:20px;
    font-size:22px;
}

.heart{
    position:absolute;
    color:white;
    animation:float 8s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="card">
    <h1>Hey Beautiful ❤️</h1>

    <p>
        Someone made this page especially for you.
    </p>

    <button onclick="showMessage()">
        Open My Heart 🌹
    </button>

    <div id="msg">
        You are my favorite thought,
        my favorite smile,
        and one of the best things that has ever happened to me. ❤️
    </div>
</div>

<script>

function showMessage(){
    document.getElementById("msg").style.display="block";
}

setInterval(()=>{
    const h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(Math.random()*20+15)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),8000);
},300);

console.log(`
🌹 SECRET MESSAGE 🌹

If you found this,
you discovered the hidden note.

You make every day brighter ❤️
`);

</script>

</body>
</html>
